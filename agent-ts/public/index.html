<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chocks</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500;7..72,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap");

    :root {
      --bg: #23211f;
      --sidebar: #1d1b19;
      --panel: #2b2926;
      --panel-soft: #262421;
      --panel-strong: #32302d;
      --line: rgba(255, 255, 255, 0.12);
      --line-soft: rgba(255, 255, 255, 0.07);
      --text: #f6f1e8;
      --muted: #b9b1a5;
      --muted-soft: #8f887d;
      --accent: #d4a776;
      --accent-soft: rgba(212, 167, 118, 0.16);
      --surface-glass: rgba(255, 255, 255, 0.03);
      --surface-raise: rgba(255, 255, 255, 0.05);
      --scroll-track: rgba(255, 255, 255, 0.04);
      --scroll-thumb: rgba(212, 167, 118, 0.56);
      --scroll-thumb-hover: rgba(212, 167, 118, 0.76);
      --shadow: 0 20px 44px rgba(0, 0, 0, 0.3);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    [hidden] {
      display: none !important;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Manrope", system-ui, sans-serif;
      overflow: hidden;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
      letter-spacing: 0.01em;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      pointer-events: none;
    }

    body::before {
      top: -180px;
      right: -120px;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle at center, rgba(212, 167, 118, 0.16), transparent 68%);
    }

    body::after {
      left: -160px;
      bottom: -200px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle at center, rgba(110, 126, 167, 0.14), transparent 70%);
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: var(--scroll-thumb) var(--scroll-track);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: var(--scroll-track);
    }

    *::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    *::-webkit-scrollbar-thumb:hover {
      background: var(--scroll-thumb-hover);
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 268px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 86px minmax(0, 1fr);
    }

    .sidebar {
      background: linear-gradient(180deg, rgba(29, 27, 25, 0.95), rgba(26, 24, 22, 0.92));
      border-right: 1px solid var(--line);
      padding: 16px 12px 12px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 18px;
      min-height: 0;
      backdrop-filter: blur(14px);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-badge {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03));
      border: 1px solid var(--line);
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }

    .brand-badge img,
    .message-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scaleX(-1);
      display: block;
    }

    .brand-name {
      font-family: "Literata", serif;
      font-size: 18px;
      letter-spacing: 0.015em;
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      border: 1px solid var(--line);
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 11px;
      background: var(--surface-glass);
      cursor: pointer;
      transition: border-color 120ms ease, color 120ms ease, background-color 120ms ease;
    }

    .brand-icon:hover {
      border-color: rgba(212, 167, 118, 0.34);
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-list,
    .workspace-list,
    .recent-list {
      display: grid;
      gap: 4px;
    }

    .nav-item,
    .workspace-item,
    .recent-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      text-align: left;
      padding: 10px 11px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background-color 140ms ease, color 140ms ease;
    }

    .nav-item:hover,
    .nav-item.active,
    .workspace-item:hover,
    .workspace-item.active,
    .recent-item:hover,
    .recent-item.active {
      background: var(--surface-raise);
      color: var(--text);
    }

    .nav-icon,
    .workspace-icon {
      width: 16px;
      height: 16px;
      color: inherit;
      text-align: center;
      opacity: 0.9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg,
    .workspace-icon svg,
    .brand-icon svg,
    .topbar-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sidebar-section-title {
      color: var(--muted-soft);
      font-size: 12px;
      padding: 0 10px;
      text-transform: none;
    }

    .search-wrap {
      padding: 0 10px;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 120ms ease, background-color 120ms ease;
    }

    .search-input:focus {
      border-color: rgba(212, 167, 118, 0.46);
      background: rgba(255, 255, 255, 0.05);
    }

    .search-input::placeholder {
      color: var(--muted-soft);
    }

    .recent-list {
      align-content: start;
      overflow-y: auto;
      min-height: 0;
    }

    .sidebar-panel {
      display: grid;
      gap: 8px;
      padding: 0 10px;
    }

    .panel-card {
      border: 1px solid var(--line);
      background: var(--surface-glass);
      border-radius: 14px;
      padding: 13px;
      display: grid;
      gap: 7px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .panel-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .panel-card-copy {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .panel-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .panel-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.02);
    }

    .tool-list {
      display: grid;
      gap: 8px;
    }

    .file-browser {
      display: grid;
      gap: 10px;
    }

    .file-browser-header {
      display: grid;
      gap: 8px;
    }

    .file-browser-breadcrumbs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-browser-crumb {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background-color 120ms ease, color 120ms ease;
    }

    .file-browser-crumb:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
    }

    .file-browser-crumb.current {
      color: #f7dfc5;
      border-color: rgba(209, 163, 112, 0.28);
      background: rgba(209, 163, 112, 0.12);
    }

    .file-browser-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-browser-list {
      display: grid;
      gap: 8px;
    }

    .file-browser-create {
      display: grid;
      gap: 8px;
    }

    .file-browser-create-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .file-browser-create-row input {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--text);
      padding: 7px 10px;
      font-size: 12px;
      transition: border-color 120ms ease, background-color 120ms ease;
    }

    .file-browser-create-row input:focus {
      outline: none;
      border-color: rgba(212, 167, 118, 0.44);
      background: rgba(255, 255, 255, 0.05);
    }

    .file-preview {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.022);
      padding: 13px;
      display: grid;
      gap: 10px;
    }

    .file-preview-header {
      display: grid;
      gap: 4px;
    }

    .file-preview-title {
      color: var(--text);
      font-size: 13px;
    }

    .file-preview-path {
      font-family: "JetBrains Mono", monospace;
      color: #f1ddd0;
      font-size: 11px;
      overflow-wrap: anywhere;
    }

    .file-preview-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-preview-meta {
      color: var(--muted-soft);
      font-size: 11px;
    }

    .file-preview-text,
    .file-preview-editor {
      width: 100%;
      min-height: 220px;
      max-height: 360px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.16);
      color: var(--text);
      padding: 10px 12px;
      overflow: auto;
      line-height: 1.5;
      font-size: 12px;
      font-family: "JetBrains Mono", monospace;
      white-space: pre;
    }

    .file-preview-editor {
      resize: vertical;
      outline: none;
    }

    .file-preview-image {
      width: 100%;
      max-height: 320px;
      border-radius: 10px;
      border: 1px solid var(--line-soft);
      object-fit: contain;
      background: rgba(0, 0, 0, 0.14);
    }

    .permission-manager {
      display: grid;
      gap: 8px;
    }

    .permission-pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .permission-pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .permission-pill.active {
      border-color: rgba(209, 163, 112, 0.28);
      background: rgba(209, 163, 112, 0.12);
      color: #f7dfc5;
    }

    .workflow-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .workflow-step-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .file-browser-item {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.024);
      padding: 10px 12px;
      display: grid;
      gap: 8px;
      transition: border-color 140ms ease, background-color 140ms ease;
    }

    .file-browser-item:hover {
      border-color: rgba(212, 167, 118, 0.28);
      background: rgba(255, 255, 255, 0.045);
    }

    .file-browser-item-main {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .file-browser-item-name {
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .file-browser-item-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .workflow-list {
      display: grid;
      gap: 10px;
    }

    .workflow-header {
      display: grid;
      gap: 6px;
    }

    .workflow-title {
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }

    .workflow-summary {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .workflow-meta {
      font-size: 11px;
      color: var(--muted-soft);
    }

    .workflow-steps {
      display: grid;
      gap: 8px;
    }

    .workflow-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.024);
      padding: 10px 12px;
    }

    .workflow-step-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 4px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: transparent;
    }

    .workflow-step.pending .workflow-step-dot {
      background: rgba(255, 255, 255, 0.08);
    }

    .workflow-step.in_progress .workflow-step-dot {
      background: var(--accent);
      border-color: transparent;
    }

    .workflow-step.completed .workflow-step-dot {
      background: #95c085;
      border-color: transparent;
    }

    .workflow-step-copy {
      display: grid;
      gap: 4px;
    }

    .workflow-step-label {
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
    }

    .workflow-step-state {
      font-size: 11px;
      color: var(--muted-soft);
      text-transform: lowercase;
    }

    .sidebar-empty {
      border: 1px dashed var(--line);
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      background: rgba(255, 255, 255, 0.02);
    }

    .tool-item {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.024);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
    }

    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .tool-name {
      color: var(--text);
      font-size: 13px;
    }

    .tool-state {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      border: 1px solid var(--line);
    }

    .tool-state.enabled {
      color: #d8f1cf;
      background: rgba(91, 140, 82, 0.2);
    }

    .tool-state.disabled {
      color: #f0c5c5;
      background: rgba(144, 71, 71, 0.18);
    }

    .tool-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .recent-item {
      justify-content: space-between;
      position: relative;
      min-width: 0;
      gap: 8px;
    }

    .recent-label {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .recent-more {
      opacity: 0;
      transition: opacity 120ms ease;
      color: var(--muted-soft);
      background: transparent;
      border: 0;
      cursor: pointer;
      width: 24px;
      height: 24px;
      border-radius: 8px;
    }

    .recent-item:hover .recent-more,
    .recent-item.active .recent-more {
      opacity: 1;
    }

    .recent-more:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .recent-empty {
      padding: 10px;
      color: var(--muted-soft);
      font-size: 12px;
    }

    .menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      width: 156px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #2b2926;
      box-shadow: var(--shadow);
      padding: 6px;
      display: grid;
      gap: 2px;
      z-index: 12;
    }

    .menu[hidden] {
      display: none !important;
    }

    .menu-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .menu-item.danger {
      color: #f2c0c0;
    }

    .sidebar-footer {
      border-top: 1px solid var(--line-soft);
      padding: 10px 6px 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .profile-avatar {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: #d8c8ae;
      color: #2d251c;
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .profile-meta {
      min-width: 0;
    }

    .profile-name {
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
    }

    .profile-plan {
      font-size: 11px;
      color: var(--muted-soft);
    }

    .app.sidebar-collapsed .brand-name,
    .app.sidebar-collapsed .nav-item span:last-child,
    .app.sidebar-collapsed .workspace-item span:last-child,
    .app.sidebar-collapsed .recent-list-wrap,
    .app.sidebar-collapsed .profile-meta {
      display: none;
    }

    .app.sidebar-collapsed .brand-row,
    .app.sidebar-collapsed .sidebar-footer {
      justify-content: center;
    }

    .app.sidebar-collapsed .brand,
    .app.sidebar-collapsed .profile {
      gap: 0;
    }

    .app.sidebar-collapsed .brand-icon svg {
      transform: scaleX(-1);
    }

    .app.sidebar-collapsed .nav-item,
    .app.sidebar-collapsed .workspace-item {
      justify-content: center;
      padding-left: 8px;
      padding-right: 8px;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(7, 6, 5, 0.45);
      display: grid;
      place-items: center;
      padding: 20px;
      z-index: 20;
    }

    .overlay[hidden] {
      display: none;
    }

    .modal {
      width: min(100%, 460px);
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #2a2825;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modal-title {
      font-family: "Literata", serif;
      font-size: 24px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    .field input,
    .field select {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 120ms ease, background-color 120ms ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(212, 167, 118, 0.44);
      background: rgba(255, 255, 255, 0.05);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #2d2b28;
      color: var(--text);
      padding: 10px 14px;
      box-shadow: var(--shadow);
    }

    .toast[hidden] {
      display: none;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      height: 58px;
      border-bottom: 1px solid var(--line-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 20px;
      background: linear-gradient(180deg, rgba(35, 33, 31, 0.82), rgba(35, 33, 31, 0.68));
      backdrop-filter: blur(10px);
    }

    .topbar-title {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 120ms ease, background-color 120ms ease;
    }

    .trace-card {

      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;

    .trace-summary-icon {

      padding: 12px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);

      border: 0;

      justify-content: space-between;

    .chat-toolbar-left,

      align-items: center;
      gap: 10px;
    }

    .status {

      color: var(--muted-soft);

    @keyframes blink {

        opacity: 1;
      }

      50%,
      100% {

      }
    }

    @media (max-width: 900px) {

      .app.sidebar-collapsed {

      .messages {

      }

      .chat-composer {

      }

</head>

  <div class="toast" id="toast" hidden></div>

  <script>
    const STORAGE_KEY = "chocks_chats_v2"
    const ACTIVE_KEY = "chocks_active_chat_v2"
    const SETTINGS_KEY = "chocks_ui_settings_v1"
    const WORKSPACE_KEY = "chocks_workspace_view_v1"
    const USER_KEY = "chocks_local_user_v1"
    const APPROVALS_KEY = "chocks_chat_approvals_v1"
    const FILE_BROWSER_KEY = "chocks_file_browser_v1"
    const FILE_PREVIEW_KEY = "chocks_file_preview_v1"
    const WORKFLOW_ARCHIVE_KEY = "chocks_workflow_archive_v1"
    const SIDEBAR_COLLAPSED_KEY = "chocks_sidebar_collapsed_v1"

    const appEl = document.querySelector(".app")
    const recentListEl = document.getElementById("recent-list")
    const sidebarPanelEl = document.getElementById("sidebar-panel")
    const sidebarSectionTitleEl = document.getElementById("sidebar-section-title")
    const searchWrapEl = document.getElementById("search-wrap")
    const searchInputEl = document.getElementById("search-input")
    const topbarTitleEl = document.getElementById("topbar-title")
    const welcomeViewEl = document.getElementById("welcome-view")
    const chatViewEl = document.getElementById("chat-view")
    const messagesInnerEl = document.getElementById("messages-inner")
    const statusEl = document.getElementById("status")
    const welcomePromptEl = document.getElementById("welcome-prompt")
    const chatPromptEl = document.getElementById("chat-prompt")
    const welcomeFileInputEl = document.getElementById("welcome-file-input")
    const chatFileInputEl = document.getElementById("chat-file-input")
    const welcomeAttachmentsEl = document.getElementById("welcome-attachments")
    const chatAttachmentsEl = document.getElementById("chat-attachments")
    const welcomeAttachmentFeedbackEl = document.getElementById("welcome-attachment-feedback")
    const chatAttachmentFeedbackEl = document.getElementById("chat-attachment-feedback")
    const welcomeSendEl = document.getElementById("welcome-send")
    const chatSendEl = document.getElementById("chat-send")
    const newChatButtonEl = document.getElementById("new-chat-button")
    const shareButtonEl = document.getElementById("share-button")
    const fullAccessToggleEl = document.getElementById("full-access-toggle")
    const profileButtonEl = document.getElementById("profile-button")
    const profileIconButtonEl = document.getElementById("profile-icon-button")
    const toggleSidebarButtonEl = document.getElementById("toggle-sidebar-button")
    const welcomeAttachEl = document.getElementById("welcome-attach")
    const chatAttachEl = document.getElementById("chat-attach")
    const searchButtonEl = document.getElementById("search-button")
    const suggestionChipEls = Array.from(document.querySelectorAll(".suggestion-chip"))
    const workspaceButtons = Array.from(document.querySelectorAll("[data-workspace]"))
    const settingsOverlayEl = document.getElementById("settings-overlay")
    const settingsDisplayNameEl = document.getElementById("settings-display-name")
    const settingsWelcomeTitleEl = document.getElementById("settings-welcome-title")
    const settingsPlanLabelEl = document.getElementById("settings-plan-label")
    const settingsPermissionModeEl = document.getElementById("settings-permission-mode")
    const settingsFullAccessEl = document.getElementById("settings-full-access")
    const settingsSaveEl = document.getElementById("settings-save")
    const settingsCancelEl = document.getElementById("settings-cancel")
    const renameOverlayEl = document.getElementById("rename-overlay")
    const renameCurrentEl = document.getElementById("rename-current")
    const renameNewEl = document.getElementById("rename-new")
    const renameConfirmEl = document.getElementById("rename-confirm")
    const renameCancelEl = document.getElementById("rename-cancel")
    const toastEl = document.getElementById("toast")
    const profileNameEl = document.querySelector(".profile-name")
    const profilePlanEl = document.querySelector(".profile-plan")
    const welcomeBadgeEls = Array.from(document.querySelectorAll(".welcome-badge"))
    const welcomeTitleEl = document.querySelector(".welcome-title")
    const welcomeFullAccessBadgeEl = document.getElementById("welcome-full-access-badge")
    const composerEls = Array.from(document.querySelectorAll(".chat-composer, .composer-card"))
    const navButtons = [newChatButtonEl, searchButtonEl]

    let searchOpen = false
    let searchQuery = ""
    let toastTimer = null
    let toolStatuses = []
    let activeWorkflow = null
    let fileBrowserState = null
    let filePreviewState = null
    let chatsState = []
    let openMenuChatId = null
    let welcomeAttachments = []
    let chatAttachments = []
    let activeStreamAbortController = null
    let isStreaming = false
    const MAX_ATTACHMENT_BYTES = 1024 * 1024
    const ALLOWED_ATTACHMENT_EXTENSIONS = [".txt", ".md", ".json", ".js", ".ts", ".tsx", ".jsx", ".css", ".html", ".yml", ".yaml"]
    const IMAGE_EXTENSIONS = [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".svg"]

    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY)
        const parsed = raw ? JSON.parse(raw) : {}
        return {
          displayName: parsed.displayName || "bsilv",
          welcomeTitle: parsed.welcomeTitle || "Bem-vindo ao Chocks",
          planLabel: parsed.planLabel || "Plano local",
          permissionMode: parsed.permissionMode || "ask",
          fullAccess: !!parsed.fullAccess,
        }
      } catch {
        return {
          displayName: "bsilv",
          welcomeTitle: "Bem-vindo ao Chocks",
          planLabel: "Plano local",
          permissionMode: "ask",
          fullAccess: false,
        }
      }
    }

    function getLocalUser() {
      try {
        const raw = localStorage.getItem(USER_KEY)
        const parsed = raw ? JSON.parse(raw) : {}
        const id = typeof parsed.id === "string" && parsed.id.trim()
          ? parsed.id.trim()
          : `user_${Date.now()}_${Math.random().toString(16).slice(2, 10)}`
        const displayName = typeof parsed.displayName === "string" && parsed.displayName.trim()
          ? parsed.displayName.trim()
          : loadSettings().displayName
        const user = { id, displayName }
        localStorage.setItem(USER_KEY, JSON.stringify(user))
        return user
      } catch {
        const user = {
          id: `user_${Date.now()}_${Math.random().toString(16).slice(2, 10)}`,
          displayName: loadSettings().displayName,
        }
        localStorage.setItem(USER_KEY, JSON.stringify(user))
        return user
      }
    }

    function syncLocalUserDisplayName() {
      const user = getLocalUser()
      const settings = loadSettings()
      const nextUser = { ...user, displayName: settings.displayName }
      localStorage.setItem(USER_KEY, JSON.stringify(nextUser))
      return nextUser
    }

    function saveSettings(settings) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings))
    }

    function loadChatApprovals() {
      try {
        const raw = localStorage.getItem(APPROVALS_KEY)
        const parsed = raw ? JSON.parse(raw) : {}
        return parsed && typeof parsed === "object" ? parsed : {}
      } catch {
        return {}
      }
    }

    function saveChatApprovals(state) {
      localStorage.setItem(APPROVALS_KEY, JSON.stringify(state || {}))
    }

    function getApprovedToolsForChat(chatId = getActiveChatId()) {
      if (!chatId) return []
      const state = loadChatApprovals()
      const approved = state?.[chatId]
      return Array.isArray(approved) ? approved.map((item) => String(item || "").trim()).filter(Boolean) : []
    }

    function approveToolForChat(chatId, tool) {
      if (!chatId || !tool) return
      const state = loadChatApprovals()
      const current = Array.isArray(state?.[chatId]) ? state[chatId] : []
      if (!current.includes(tool)) {
        state[chatId] = [...current, tool]
        saveChatApprovals(state)
      }
    }

    function clearChatApprovals(chatId) {
      if (!chatId) return
      const state = loadChatApprovals()
      if (Object.prototype.hasOwnProperty.call(state, chatId)) {
        delete state[chatId]
        saveChatApprovals(state)
      }
    }

    function getWorkspaceMode() {
      return localStorage.getItem(WORKSPACE_KEY) || "conversations"
    }

    function setWorkspaceMode(mode) {
      localStorage.setItem(WORKSPACE_KEY, mode)
    }

    function loadFileBrowserState() {
      try {
        const raw = localStorage.getItem(FILE_BROWSER_KEY)
        const parsed = raw ? JSON.parse(raw) : null
        if (!parsed || typeof parsed !== "object") return null
        return {
          path: typeof parsed.path === "string" ? parsed.path : "",
          entries: Array.isArray(parsed.entries) ? parsed.entries : [],
        }
      } catch {
        return null
      }
    }

    function saveFileBrowserState(state) {
      fileBrowserState = state
      localStorage.setItem(FILE_BROWSER_KEY, JSON.stringify(state || {}))
    }

    function loadFilePreviewState() {
      try {
        const raw = localStorage.getItem(FILE_PREVIEW_KEY)
        const parsed = raw ? JSON.parse(raw) : null
        if (!parsed || typeof parsed !== "object") return null
        return {
          path: typeof parsed.path === "string" ? parsed.path : "",
          mode: typeof parsed.mode === "string" ? parsed.mode : "empty",
          content: typeof parsed.content === "string" ? parsed.content : "",
          mime: typeof parsed.mime === "string" ? parsed.mime : "",
          updatedAt: typeof parsed.updatedAt === "string" ? parsed.updatedAt : "",
        }
      } catch {
        return null
      }
    }

    function saveFilePreviewState(state) {
      filePreviewState = state
      localStorage.setItem(FILE_PREVIEW_KEY, JSON.stringify(state || {}))
    }

    function clearFilePreviewState() {
      filePreviewState = null
      localStorage.removeItem(FILE_PREVIEW_KEY)
    }

    function loadWorkflowArchive() {
      try {
        const raw = localStorage.getItem(WORKFLOW_ARCHIVE_KEY)
        const parsed = raw ? JSON.parse(raw) : {}
        return parsed && typeof parsed === "object" ? parsed : {}
      } catch {
        return {}
      }
    }

    function saveWorkflowArchive(state) {
      localStorage.setItem(WORKFLOW_ARCHIVE_KEY, JSON.stringify(state || {}))
    }

    function getArchivedWorkflowForChat(chatId = getActiveChatId()) {
      if (!chatId) return null
      const archive = loadWorkflowArchive()
      return archive?.[chatId] || null
    }

    function setArchivedWorkflowForChat(chatId, workflow) {
      if (!chatId || !workflow) return
      const archive = loadWorkflowArchive()
      archive[chatId] = workflow
      saveWorkflowArchive(archive)
    }

    function clearArchivedWorkflowForChat(chatId) {
      if (!chatId) return
      const archive = loadWorkflowArchive()
      if (Object.prototype.hasOwnProperty.call(archive, chatId)) {
        delete archive[chatId]
        saveWorkflowArchive(archive)
      }
    }

    function getPermissionCategories() {
      return {
        leitura: ["file_read", "glob", "grep", "todo_list", "workflow_get", "env_get", "pwd", "ls_safe"],
        escrita: ["file_write", "file_edit", "file_copy", "file_move", "directory_create", "todo_add", "todo_update", "workflow_replace", "workflow_update_step", "workflow_clear"],
        exclusao: ["file_delete"],
        web: ["web_fetch"],
        shell: ["bash_exec"],
      }
    }

    function revokeToolForChat(chatId, tool) {
      if (!chatId || !tool) return
      const state = loadChatApprovals()
      const current = Array.isArray(state?.[chatId]) ? state[chatId] : []
      state[chatId] = current.filter((item) => item !== tool)
      if (state[chatId].length === 0) delete state[chatId]
      saveChatApprovals(state)
    }

    function approveCategoryForChat(chatId, category) {
      const categories = getPermissionCategories()
      const tools = categories?.[category] || []
      tools.forEach((tool) => approveToolForChat(chatId, tool))
    }

    function revokeCategoryForChat(chatId, category) {
      const categories = getPermissionCategories()
      const tools = categories?.[category] || []
      tools.forEach((tool) => revokeToolForChat(chatId, tool))
    }

    function isImagePath(pathText) {
      const lower = String(pathText || "").toLowerCase()
      return IMAGE_EXTENSIONS.some((ext) => lower.endsWith(ext))
    }

    function applySettingsToUi() {
      const settings = loadSettings()
      profileNameEl.textContent = settings.displayName
      profilePlanEl.textContent = settings.planLabel
      if (welcomeBadgeEls[0]) welcomeBadgeEls[0].textContent = settings.planLabel
      if (welcomeTitleEl) welcomeTitleEl.innerHTML = `<span class="spark">*</span>${escapeHtml(settings.welcomeTitle)}`
      if (fullAccessToggleEl) {
        fullAccessToggleEl.textContent = settings.fullAccess ? "Acesso total: on" : "Acesso total: off"
        fullAccessToggleEl.classList.toggle("danger", !!settings.fullAccess)
      }
      if (welcomeFullAccessBadgeEl) {
        welcomeFullAccessBadgeEl.hidden = !settings.fullAccess
      }
    }

    function toggleFullAccess() {
      const settings = loadSettings()
      saveSettings({
        ...settings,
        fullAccess: !settings.fullAccess,
      })
      applySettingsToUi()
      loadToolStatuses()
      showToast(!settings.fullAccess ? "Acesso total ativado" : "Acesso total desativado")
    }

    function showToast(message) {
      toastEl.textContent = message
      toastEl.hidden = false
      if (toastTimer) window.clearTimeout(toastTimer)
      toastTimer = window.setTimeout(() => {
        toastEl.hidden = true
      }, 2200)
    }

    function isSidebarCollapsed() {
      return localStorage.getItem(SIDEBAR_COLLAPSED_KEY) === "1"
    }

    function setSidebarCollapsed(collapsed) {
      localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed ? "1" : "0")
    }

    function applySidebarState() {
      const collapsed = isSidebarCollapsed()
      if (!appEl) return
      appEl.classList.toggle("sidebar-collapsed", collapsed)
      if (toggleSidebarButtonEl) {
        toggleSidebarButtonEl.title = collapsed ? "Expandir sidebar" : "Colapsar sidebar"
        toggleSidebarButtonEl.setAttribute("aria-label", collapsed ? "Expandir sidebar" : "Colapsar sidebar")
      }
    }

    function openSettingsOverlay() {
      const settings = loadSettings()
      settingsDisplayNameEl.value = settings.displayName
      settingsWelcomeTitleEl.value = settings.welcomeTitle
      settingsPlanLabelEl.value = settings.planLabel
      settingsPermissionModeEl.value = settings.permissionMode || "ask"
      settingsFullAccessEl.checked = !!settings.fullAccess
      settingsOverlayEl.hidden = false
    }

    function applySuggestionPrompt(promptText) {
      if (!promptText) return
      const isChatOpen = !chatViewEl.hidden
      if (isChatOpen) {
        chatPromptEl.value = promptText
        chatPromptEl.focus()
        return
      }
      welcomePromptEl.value = promptText
      welcomePromptEl.focus()
    }

    function syncStreamingUi() {
      composerEls.forEach((el) => {
        el.classList.toggle("is-busy", isStreaming)
      })

      const sendLabel = isStreaming ? "x" : "^"
      welcomeSendEl.textContent = sendLabel
      chatSendEl.textContent = sendLabel
      welcomeSendEl.classList.toggle("cancel", isStreaming)
      chatSendEl.classList.toggle("cancel", isStreaming)
      if (isStreaming) {
        const chat = getActiveChat()
        const activity = getLatestActivity(chat)
        statusEl.textContent = activity ? `${activity.label.toLowerCase()}: ${activity.text}` : "Chocks esta respondendo..."
        return
      }
      statusEl.textContent = getWorkflowStatusCopy()
    }

    function setAttachmentFeedback(kind, message = "", isError = false) {
      const el = kind === "welcome" ? welcomeAttachmentFeedbackEl : chatAttachmentFeedbackEl
      if (!message) {
        el.hidden = true
        el.textContent = ""
        el.classList.remove("error")
        return
      }
      el.hidden = false
      el.textContent = message
      el.classList.toggle("error", isError)
    }

    function renderAttachmentList(container, attachments, kind) {
      container.hidden = attachments.length === 0
      container.innerHTML = attachments
        .map((attachment, index) => {
          return `
              <div class="attachment-chip">
                <span>${escapeHtml(attachment.name)}</span>
                <button class="attachment-remove" data-attachment-kind="${kind}" data-attachment-index="${index}" type="button">x</button>
              </div>
            `
        })
        .join("")

      container.querySelectorAll(".attachment-remove").forEach((button) => {

    function formatAttachmentsForPrompt(attachments) {
      if (!attachments.length) return ""
      return attachments
        .map((attachment) => {
          const preview = attachment.content.length > 4000
            ? `${attachment.content.slice(0, 4000)}\n[arquivo truncado]`
            : attachment.content
          return `Arquivo anexado: ${attachment.name}\n${preview}`
        })
        .join("\n\n")
    }

    function getSettingsCards() {
      const settings = loadSettings()
      return [
        { title: "Nome exibido", copy: settings.displayName, chips: ["perfil"] },
        { title: "Titulo da home", copy: settings.welcomeTitle, chips: ["boas-vindas"] },
        { title: "Badge principal", copy: settings.planLabel, chips: ["badge"] },
        { title: "Permissoes", copy: settings.permissionMode === "auto" ? "Auto" : settings.permissionMode === "read_only" ? "Read-only" : "Ask", chips: ["seguranca"] },
        { title: "Acesso total", copy: settings.fullAccess ? "Ativado" : "Desativado", chips: ["sistema"] },

    function getWorkflowProgress(workflow) {
      const steps = Array.isArray(workflow?.steps) ? workflow.steps : []
      const total = steps.length
      const completed = steps.filter((step) => step.status === "completed").length
      const running = steps.find((step) => step.status === "in_progress")
      return { total, completed, running }
    }

    function getWorkflowStatusCopy() {
      if (!activeWorkflow) return ""
      const progress = getWorkflowProgress(activeWorkflow)
      if (progress.total === 0) return "Workflow ativo"
      if (progress.running) {
        return `${progress.completed}/${progress.total} etapas concluidas`
      }
      if (progress.completed === progress.total) {
        return "Workflow pronto para encerrar"
      }
      return `${progress.completed}/${progress.total} etapas concluidas`
    }

    function formatWorkflowDate(value) {
      if (!value) return ""
      try {
        return new Date(value).toLocaleString("pt-BR", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        })
      } catch {
        return ""
      }
    }

              <div class="workflow-meta">${metaParts.join(" | ")}</div>
              <div class="workflow-actions">
                <button class="listing-action" type="button" data-workflow-action="resume-active">Retomar no chat</button>
                <button class="listing-action" type="button" data-workflow-action="archive">Arquivar</button>
                <button class="listing-action" type="button" data-workflow-action="reset">Resetar</button>

            </div>
            <div class="workflow-steps">

              "pendente"
        return `
                  <div class="workflow-step ${escapeHtml(step.status || "pending")}">
                    <div class="workflow-step-dot"></div>

                      <div class="workflow-step-state">${label}</div>
                      <div class="workflow-step-actions">
                        <button class="listing-action" type="button" data-workflow-edit="${escapeHtml(step.id)}">Editar</button>
                        <button class="listing-action" type="button" data-workflow-status="pending" data-workflow-step="${escapeHtml(step.id)}">Pendente</button>
                        <button class="listing-action" type="button" data-workflow-status="in_progress" data-workflow-step="${escapeHtml(step.id)}">Em andamento</button>
                        <button class="listing-action" type="button" data-workflow-status="completed" data-workflow-step="${escapeHtml(step.id)}">Concluir</button>
                        <button class="listing-action" type="button" data-workflow-block="${escapeHtml(step.id)}" data-workflow-index="${index}">Marcar bloqueio</button>

        button.addEventListener("click", () => {
          const stepId = button.getAttribute("data-workflow-step")
          const status = button.getAttribute("data-workflow-status")
          if (!stepId || !status) return
          updateWorkflowStep(stepId, { status })
        })

          const step = activeWorkflow?.steps?.find((item) => item.id === stepId)
          if (!step) return
          const nextText = window.prompt("Editar etapa:", step.text || "")
          if (!nextText || !nextText.trim()) return
          updateWorkflowStep(stepId, { text: nextText.trim() })
        })

          if (!stepId || !step) return
          const note = window.prompt("Descreva o bloqueio:", "")
          if (!note || !note.trim()) return
          updateWorkflowStep(stepId, {

    async function updateWorkflowStep(stepId, patch) {
      const chatId = getActiveChatId()
      if (!chatId || !stepId) return
      try {
        await requestJson("/tools/run", {
          method: "POST",
          chatId,
          headers: {
            "x-chocks-permission-mode": "auto",
          },
          body: JSON.stringify({
            chatId,
            tool: "workflow_update_step",
            input: {
              id: stepId,
              ...(typeof patch?.text === "string" ? { text: patch.text } : {}),
              ...(typeof patch?.status === "string" ? { status: patch.status } : {}),
            },
            permissionMode: "auto",
            approvedTools: getApprovedToolsForChat(chatId),
          }),
        })
        await loadWorkflowStatus(chatId)
        showToast("Workflow atualizado")
      } catch (error) {
        showToast(`Erro: ${String(error)}`)
      }
    }

    async function handleWorkflowAction(action) {
      const chatId = getActiveChatId()
      if (!chatId || !action) return

      if (action === "resume-active" && activeWorkflow) {
        const focus = activeWorkflow.steps.find((step) => step.status === "in_progress") || activeWorkflow.steps[0]
        const extra = focus ? `Etapa foco: ${focus.text}` : ""
        submitMessage(`Retome esta tarefa com base no workflow atual. ${extra}`.trim(), "chat")
        return
      }

      if (action === "resume-archived") {
        const archived = getArchivedWorkflowForChat(chatId)
        if (!archived) return
        const steps = Array.isArray(archived.steps) ? archived.steps.map((step) => `- ${step.text} [${step.status}]`).join("\n") : ""
        submitMessage(`Retome esta tarefa arquivada:\nObjetivo: ${archived.goal || ""}\n${steps}`.trim(), "chat")
        return
      }

      if (action === "clear-archived") {
        clearArchivedWorkflowForChat(chatId)
        renderSidebarMode()
        showToast("Workflow arquivado removido")
        return
      }

      if (action === "archive") {
        if (!activeWorkflow) return
        setArchivedWorkflowForChat(chatId, {
          ...activeWorkflow,
          archivedAt: new Date().toISOString(),
        })
        try {
          await requestJson("/tools/run", {
            method: "POST",
            chatId,
            headers: {
              "x-chocks-permission-mode": "auto",
            },
            body: JSON.stringify({
              chatId,
              tool: "workflow_clear",
              input: {},
              permissionMode: "auto",
              approvedTools: getApprovedToolsForChat(chatId),
            }),
          })
          await loadWorkflowStatus(chatId)
          showToast("Workflow arquivado")
        } catch (error) {
          showToast(`Erro: ${String(error)}`)
        }
        return
      }

      if (action === "reset") {
        const confirmed = window.confirm("Resetar o workflow desta conversa?")
        if (!confirmed) return
        try {
          await requestJson("/tools/run", {
            method: "POST",
            chatId,
            headers: {
              "x-chocks-permission-mode": "auto",
            },
            body: JSON.stringify({
              chatId,
              tool: "workflow_clear",
              input: {},
              permissionMode: "auto",
              approvedTools: getApprovedToolsForChat(chatId),
            }),
          })
          await loadWorkflowStatus(chatId)
          showToast("Workflow resetado")
        } catch (error) {
          showToast(`Erro: ${String(error)}`)
        }
      }
    }

    function loadChats() {
      return Array.isArray(chatsState) ? chatsState : []
    }

    function saveChats(chats) {
      chatsState = Array.isArray(chats) ? chats : []
    }

    function loadLegacyChatsFromStorage() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY)
        if (!raw) return []
        const parsed = JSON.parse(raw)
        return Array.isArray(parsed) ? parsed : []
      } catch {
        return []
      }
    }

    function getActiveChatId() {
      return localStorage.getItem(ACTIVE_KEY)
    }

    function setActiveChatId(id) {
      localStorage.setItem(ACTIVE_KEY, id)
    }

    function makeTitle(text) {
      const trimmed = String(text || "").trim()
      if (!trimmed) return "Nova conversa"

      const windowsPathMatch = trimmed.match(/[A-Za-z]:[\\/][^\r\n"'?]+?\\([^\\/\r\n"'?]+\.[A-Za-z0-9_-]+)/)
      if (windowsPathMatch?.[1]) {
        return windowsPathMatch[1].slice(0, 36)
      }

      const firstLine = trimmed.split("\n")[0].trim()
      return firstLine ? firstLine.slice(0, 36) : "Nova conversa"
    }

    function createChat(seedTitle = "Nova conversa") {
      const id = `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`
      const chat = { id, title: seedTitle, messages: [] }
      const chats = [chat, ...loadChats()]
      saveChats(chats)
      setActiveChatId(id)
      return chat
    }

    async function requestJson(url, options = {}) {
      const localUser = getLocalUser()
      const settings = loadSettings()
      const approvedTools = getApprovedToolsForChat(options.chatId || getActiveChatId())
      const response = await fetch(url, {
        headers: {
          "Content-Type": "application/json",
          "x-chocks-user-id": localUser.id,
          "x-chocks-display-name": localUser.displayName,
          "x-chocks-full-access": settings.fullAccess ? "true" : "false",
          "x-chocks-permission-mode": settings.permissionMode,
          "x-chocks-approved-tools": approvedTools.join(","),
          ...(options.headers || {}),
        },
        ...options,
      })

      const data = await response.json().catch(() => ({}))
      if (!response.ok) {
        const message = data?.error || `${response.status} ${response.statusText}`
        throw new Error(message)
      }
      return data
    }

    async function refreshChatsFromServer() {
      const data = await requestJson("/conversations")
      const conversations = Array.isArray(data?.conversations) ? data.conversations : []
      saveChats(conversations)

      const activeId = getActiveChatId()
      if (activeId && conversations.some((chat) => chat.id === activeId)) {
        return conversations
      }

      if (conversations[0]?.id) {
        setActiveChatId(conversations[0].id)
      }

      return conversations
    }

    async function migrateLegacyChatsIfNeeded() {
      const existingChats = await refreshChatsFromServer()
      if (existingChats.length > 0) return existingChats

      const legacyChats = loadLegacyChatsFromStorage()
      if (legacyChats.length === 0) return existingChats

      for (const legacyChat of legacyChats) {
        const normalizedChat = {
          id: legacyChat.id || `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`,
          title: legacyChat.title || "Nova conversa",
          messages: Array.isArray(legacyChat.messages) ? legacyChat.messages : [],
        }
        await requestJson(`/conversations/${encodeURIComponent(normalizedChat.id)}`, {
          method: "PUT",
          body: JSON.stringify(normalizedChat),
        })
      }

      return refreshChatsFromServer()
    }

    async function persistChat(chat) {
      const data = await requestJson(`/conversations/${encodeURIComponent(chat.id)}`, {
        method: "PUT",
        body: JSON.stringify(chat),
      })
      if (data?.conversation) {
        upsertChat(data.conversation)
        return data.conversation
      }
      return chat
    }

    function getActiveChat() {
      const chats = loadChats()
      const activeId = getActiveChatId()
      return chats.find((chat) => chat.id === activeId) || chats[0] || null
    }

    async function renameChat(chatId) {
      const chats = loadChats()
      const chat = chats.find((item) => item.id === chatId)
      if (!chat) return
      const nextTitle = window.prompt("Novo nome da conversa:", chat.title || "Nova conversa")
      if (!nextTitle) return
      const title = nextTitle.trim() || "Nova conversa"
      chat.title = title
      saveChats(chats)
      await requestJson(`/conversations/${encodeURIComponent(chatId)}`, {
        method: "PATCH",
        body: JSON.stringify({ title }),
      })
      renderApp()
      showToast("Conversa renomeada")
    }

    async function duplicateChat(chatId) {
      const chats = loadChats()
      const chat = chats.find((item) => item.id === chatId)
      if (!chat) return
      const nextId = `chat_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`
      const data = await requestJson(`/conversations/${encodeURIComponent(chatId)}/duplicate`, {
        method: "POST",
        body: JSON.stringify({ id: nextId }),
      })
      const copy = data?.conversation
      if (!copy) throw new Error("falha ao duplicar conversa")
      saveChats([copy, ...chats])
      setActiveChatId(copy.id)
      await loadWorkflowStatus(copy.id)
      renderApp()
      showToast("Conversa duplicada")
    }

    async function deleteChat(chatId) {
      const chats = loadChats()
      const chat = chats.find((item) => item.id === chatId)
      if (!chat) return
      const confirmed = window.confirm(`Excluir a conversa "${chat.title || "Nova conversa"}"?`)
      if (!confirmed) return
      await requestJson(`/conversations/${encodeURIComponent(chatId)}`, {
        method: "DELETE",
      })
      clearChatApprovals(chatId)
      clearArchivedWorkflowForChat(chatId)
      const nextChats = chats.filter((item) => item.id !== chatId)
      saveChats(nextChats)
      openMenuChatId = null

      if (nextChats.length === 0) {
        const fresh = createChat()
        setActiveChatId(fresh.id)
        await requestJson("/conversations", {
          method: "POST",
          body: JSON.stringify({ id: fresh.id, title: fresh.title }),
        })
        await loadWorkflowStatus(fresh.id)
      } else if (getActiveChatId() === chatId) {
        setActiveChatId(nextChats[0].id)
        await loadWorkflowStatus(nextChats[0].id)
      }

      renderApp()
      showToast("Conversa excluida")
    }

    function upsertChat(updatedChat) {
      const chats = loadChats()
      const index = chats.findIndex((chat) => chat.id === updatedChat.id)
      if (index === -1) chats.unshift(updatedChat)
      else chats[index] = updatedChat
      saveChats(chats)
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
    }

    function tryParseJson(text) {
      if (typeof text !== "string") return null
      const trimmed = text.trim()
      if (!trimmed) return null
      try {
        return JSON.parse(trimmed)
      } catch {
        return null
      }
    }

    function formatTraceText(text) {
      const parsed = tryParseJson(text)
      if (parsed === null) return escapeHtml(text || "")
      return escapeHtml(JSON.stringify(parsed, null, 2))
    }

    function isPermissionBlockedOutput(text) {
      const parsed = tryParseJson(text)
      return !!(parsed && parsed.ok === false && typeof parsed.error === "string" && parsed.error.includes("permission blocked:"))
    }

    function getToolUiMeta(tool) {
      const normalized = String(tool || "").trim()
      const map = {
        file_read: { label: "Lendo arquivo", noun: "leitura de arquivo", destructive: false },
        file_write: { label: "Salvando arquivo", noun: "gravacao de arquivo", destructive: false },
        file_edit: { label: "Editando arquivo", noun: "edicao de arquivo", destructive: false },
        file_copy: { label: "Copiando item", noun: "copia de item", destructive: false },
        file_delete: { label: "Excluindo arquivo", noun: "exclusao de arquivo", destructive: true },
        file_move: { label: "Movendo item", noun: "movimentacao de item", destructive: true },
        directory_create: { label: "Criando pasta", noun: "criacao de pasta", destructive: false },
        glob: { label: "Buscando arquivos", noun: "busca de arquivos", destructive: false },
        grep: { label: "Procurando no conteudo", noun: "busca no conteudo", destructive: false },
        bash_exec: { label: "Executando comando", noun: "execucao de comando", destructive: true },
        web_fetch: { label: "Acessando web", noun: "acesso web", destructive: false },
        todo_list: { label: "Lendo tarefas", noun: "leitura de tarefas", destructive: false },
        todo_add: { label: "Criando tarefa", noun: "criacao de tarefa", destructive: false },
        todo_update: { label: "Atualizando tarefa", noun: "atualizacao de tarefa", destructive: false },
        workflow_get: { label: "Lendo workflow", noun: "leitura de workflow", destructive: false },
        workflow_replace: { label: "Atualizando workflow", noun: "atualizacao de workflow", destructive: false },
        workflow_update_step: { label: "Atualizando etapa", noun: "atualizacao de etapa", destructive: false },
        workflow_clear: { label: "Limpando workflow", noun: "limpeza de workflow", destructive: false },
        env_get: { label: "Lendo ambiente", noun: "leitura de ambiente", destructive: false },
        pwd: { label: "Lendo pasta atual", noun: "leitura da pasta atual", destructive: false },
        ls_safe: { label: "Listando pasta", noun: "listagem de pasta", destructive: false },
      }
      return map[normalized] || { label: normalized, noun: normalized, destructive: false }
    }

    function formatToolExecutionMessage(tool, result, args) {
      const toolMeta = getToolUiMeta(tool)
      if (!result?.ok) {
        const errorText = typeof result?.error === "string" ? result.error : "A acao falhou."
        return `Acao autorizada, mas houve erro em ${toolMeta.noun}.\n\n${errorText}`
      }

      const output = result?.output

      if (tool === "file_delete" && output?.deleted) {
        return `Acao autorizada. Arquivo excluido: ${output.path}.`
      }

      if (tool === "file_write" && output?.path) {
        return `Acao autorizada. Arquivo salvo: ${output.path}.`
      }

      if (tool === "file_edit" && output?.changed) {
        return `Acao autorizada. Arquivo atualizado: ${output.path}.`
      }

      if (tool === "file_move" && output?.to_path) {
        return `Acao autorizada. Item movido para: ${output.to_path}.`
      }

      if (tool === "file_copy" && output?.to_path) {
        return `Acao autorizada. Item copiado para: ${output.to_path}.`
      }

      if (tool === "directory_create" && output?.path) {
        return `Acao autorizada. Pasta criada: ${output.path}.`
      }

      if (tool === "bash_exec" && output) {
        const stdout = String(output.stdout || "").trim()
        const stderr = String(output.stderr || "").trim()
        if (stdout) return `Acao autorizada. Comando executado com sucesso.\n\n${stdout}`
        if (stderr) return `Acao autorizada. O comando retornou:\n\n${stderr}`
        return "Acao autorizada. Comando executado."
      }

      if (tool === "web_fetch" && output?.status) {
        return `Acao autorizada. Requisicao concluida com status ${output.status}.`
      }

      if (tool === "ls_safe" && output?.path) {
        return `Acao autorizada. Pasta listada: ${output.path}.`
      }

      if (tool === "file_read" && typeof output === "string") {
        return `Acao autorizada. Conteudo de ${args?.path || "arquivo"}:\n\n${output}`
      }

      return `Acao autorizada. ${toolMeta.label} concluido com sucesso.`
    }

    function getBlockedPermissionRequest(message) {
      const trace = Array.isArray(message?.trace) ? message.trace : []
      const toolCalls = new Map()

      trace.forEach((entry) => {
        if (entry?.type === "tool_call") {
          toolCalls.set(entry.call_id, entry.name)
          return
        }
        if (entry?.type !== "tool_output") return
        if (!isPermissionBlockedOutput(String(entry.output || ""))) return

        const toolName = toolCalls.get(entry.call_id) || "acao"
        const args = toolCalls.has(entry.call_id)
          ? trace.find((item) => item?.type === "tool_call" && item.call_id === entry.call_id)?.arguments || "{}"
          : "{}"

        return { toolName, args }
      })

      for (let index = trace.length - 1; index >= 0; index -= 1) {
        const entry = trace[index]
        if (entry?.type !== "tool_output") continue
        if (!isPermissionBlockedOutput(String(entry.output || ""))) continue
        const toolName = toolCalls.get(entry.call_id) || "acao"
        const toolCall = trace.find((item) => item?.type === "tool_call" && item.call_id === entry.call_id)
        return {
          toolName,
          args: toolCall?.arguments || "{}",
        }
      }

      return null
    }

    async function appendToolExecutionResult(chatId, tool, args, result) {
      const chats = loadChats()
      const chat = chats.find((item) => item.id === chatId)
      if (!chat) return null

      const callId = `approved_${Date.now()}`
      chat.messages.push({
        role: "agent",
        content: formatToolExecutionMessage(tool, result, args),
        trace: [
          { type: "tool_call", name: tool, call_id: callId, arguments: JSON.stringify(args || {}) },
          { type: "tool_output", call_id: callId, output: JSON.stringify(result || {}) },
        ],
        streaming: false,
      })
      upsertChat(chat)
      await persistChat(chat)
      await loadWorkflowStatus(chatId)
      renderApp()
      return chat
    }

    async function continueAfterApproval(chatId, tool, args) {
      let chat = getActiveChat()
      if (!chat || chat.id !== chatId) {
        const chats = loadChats()
        chat = chats.find((item) => item.id === chatId) || null
      }
      if (!chat) return

      const toolMeta = getToolUiMeta(tool)
      chat.messages.push({ role: "agent", content: "", trace: [], streaming: true })
      upsertChat(chat)
      renderApp()
      await persistChat(chat)

      isStreaming = true
      activeStreamAbortController = new AbortController()
      syncStreamingUi()

      const requestMessages = [
        ...buildApiMessages(chat),
        {
          role: "user",
          content: `Permissao concedida para ${toolMeta.noun} com os argumentos ${JSON.stringify(args || {})}. Continue a tarefa a partir do resultado mais recente sem repetir o que ja foi feito.`,
        },
      ]

      try {
        await consumeChatStream(chat.id, requestMessages, activeStreamAbortController.signal)
      } catch (error) {
        chat = getActiveChat() || chat
        const lastMessage = chat.messages[chat.messages.length - 1]
        if (lastMessage?.role === "agent") {
          if (String(error).includes("AbortError")) {
            lastMessage.content = `${lastMessage.content || ""}\n\n[resposta cancelada]`.trim()
          } else {
            lastMessage.content = `Erro: ${String(error)}`
          }
          lastMessage.trace = []
          lastMessage.streaming = false
        } else {
          chat.messages.push({ role: "agent", content: `Erro: ${String(error)}`, trace: [], streaming: false })
        }
        upsertChat(chat)
        await persistChat(chat)
        renderApp()
      } finally {
        isStreaming = false
        activeStreamAbortController = null
        const latestChat = getActiveChat()
        const latestMessage = latestChat?.messages?.[latestChat.messages.length - 1]
        if (latestMessage?.role === "agent") {
          latestMessage.streaming = false
          upsertChat(latestChat)
          await persistChat(latestChat)
        }
        syncStreamingUi()
        await loadWorkflowStatus(chatId)
        renderApp()
      }
    }

    async function handleApprovalAction(chatId, encodedTool, encodedArgs, buttonEl, allowAlways = false) {
      const tool = decodeURIComponent(encodedTool)
      let args = {}
      try {
        args = JSON.parse(decodeURIComponent(encodedArgs) || "{}")
      } catch {
        showToast("Nao foi possivel ler os argumentos da acao")
        return
      }

      const button = buttonEl instanceof HTMLElement ? buttonEl : null
      if (button) {
        button.disabled = true
        button.textContent = "Executando..."
      }

      if (allowAlways) {
        approveToolForChat(chatId, tool)
      }

      try {
        const result = await requestJson("/tools/run", {
          method: "POST",
          chatId,
          headers: {
            "x-chocks-permission-mode": "auto",
          },
          body: JSON.stringify({
            chatId,
            tool,
            input: args,
            permissionMode: "auto",
            approvedTools: getApprovedToolsForChat(chatId),
          }),
        })
        const chat = await appendToolExecutionResult(chatId, tool, args, result)
        showToast("Acao autorizada e executada")
        await loadToolStatuses()
        if (chat && result?.ok) {
          await continueAfterApproval(chatId, tool, args)
        }
      } catch (error) {
        showToast(`Erro: ${String(error)}`)
        if (button) {
          button.disabled = false
          button.textContent = "Permitir agora"
        }
      }
    }

    function buildListingMessage(targetPath, entries) {
      const normalizedPath = String(targetPath || "")
      const title = /(^|[\\/])(desktop|area de trabalho)$/iu.test(normalizedPath) ? "Area de Trabalho" : "Pasta"
      const sortedEntries = Array.isArray(entries)
        ? [...entries].sort((a, b) => {
          if (a?.type !== b?.type) return a?.type === "dir" ? -1 : 1
          return String(a?.name || "").localeCompare(String(b?.name || ""), "pt-BR", { sensitivity: "base" })
        })
        : []
      const lines = sortedEntries.map((entry) => `${entry.type === "dir" ? "Pasta" : "Arquivo"}  ${entry.name}`)
      const summary = `${sortedEntries.length} ${sortedEntries.length === 1 ? "item encontrado" : "itens encontrados"}`
      return `${title}\n${targetPath}\n\n${summary}\n\n${lines.join("\n") || "Vazia."}`
    }

    async function replaceListingMessage(chatId, messageIndex, targetPath, result) {
      const chats = loadChats()
      const chat = chats.find((item) => item.id === chatId)
      if (!chat) return
      const message = chat.messages?.[messageIndex]
      if (!message || message.role !== "agent") return

      const callId = `listing_${Date.now()}`
      const entries = Array.isArray(result?.output?.entries) ? result.output.entries : []
      saveFileBrowserState({ path: targetPath, entries })
      message.content = buildListingMessage(targetPath, entries)
      message.trace = [
        { type: "tool_call", name: "ls_safe", call_id: callId, arguments: JSON.stringify({ path: targetPath }) },
        { type: "tool_output", call_id: callId, output: JSON.stringify(result || {}) },
      ]
      message.streaming = false
      upsertChat(chat)
      await persistChat(chat)
      renderApp()
    }

    async function refreshListingMessage(chatId, messageIndex, targetPath) {
      const result = await requestJson("/tools/run", {
        method: "POST",
        chatId,
        headers: {
          "x-chocks-permission-mode": "auto",
        },
        body: JSON.stringify({
          chatId,
          tool: "ls_safe",
          input: { path: targetPath },
          permissionMode: "auto",
          approvedTools: getApprovedToolsForChat(chatId),
        }),
      })
      if (result?.ok) {
        saveFileBrowserState({
          path: targetPath,
          entries: Array.isArray(result?.output?.entries) ? result.output.entries : [],
        })
        await replaceListingMessage(chatId, messageIndex, targetPath, result)
      }
    }

    function buildPathCrumbs(targetPath) {
      const normalized = String(targetPath || "").trim()
      if (!normalized) return []
      const windowsMatch = normalized.match(/^([A-Za-z]:)(.*)$/u)
      if (!windowsMatch) return [{ label: normalized, path: normalized }]

      const drive = windowsMatch[1]
      const remainder = windowsMatch[2] || ""
      const parts = remainder.split(/[\\/]+/u).filter(Boolean)
      const crumbs = [{ label: drive, path: drive }]
      let currentPath = drive
      for (const part of parts) {
        currentPath = `${currentPath}\\${part}`
        crumbs.push({ label: part, path: currentPath })
      }
      return crumbs
    }

    function buildDownloadUrl(pathText) {
      const query = encodeURIComponent(pathText)
      const settings = loadSettings()
      const fullAccess = settings.fullAccess ? "&fullAccess=true" : ""
      return `/files/download?path=${query}&permissionMode=auto${fullAccess}`
    }

    function buildRawUrl(pathText) {
      const query = encodeURIComponent(pathText)
      const settings = loadSettings()
      const fullAccess = settings.fullAccess ? "&fullAccess=true" : ""
      return `/files/raw?path=${query}&permissionMode=auto${fullAccess}`
    }

    function createSiblingCopyPath(pathText, suffix = "_copia") {
      const source = String(pathText || "")
      const slashIndex = Math.max(source.lastIndexOf("\\"), source.lastIndexOf("/"))
      const parent = slashIndex >= 0 ? source.slice(0, slashIndex) : ""
      const name = slashIndex >= 0 ? source.slice(slashIndex + 1) : source
      const dotIndex = name.lastIndexOf(".")
      const base = dotIndex > 0 ? name.slice(0, dotIndex) : name
      const ext = dotIndex > 0 ? name.slice(dotIndex) : ""
      const nextName = `${base}${suffix}${ext}`
      return parent ? `${parent}\\${nextName}` : nextName
    }

    function buildRelativePath(basePath, relativeSegment) {
      const base = String(basePath || "").replace(/[\\\/]+$/u, "")
      const segment = String(relativeSegment || "").trim()
      if (!segment) return ""
      if (/^[A-Za-z]:[\\/]/.test(segment)) return segment
      return `${base}\\${segment.replace(/^[\\\/]+/u, "")}`
    }

    async function openFilePreview(pathText, editMode = false) {
      const normalizedPath = String(pathText || "").trim()
      if (!normalizedPath) return

      if (isImagePath(normalizedPath)) {
        saveFilePreviewState({
          path: normalizedPath,
          mode: editMode ? "image" : "image",
          content: "",
          mime: "image",
          updatedAt: new Date().toISOString(),
        })
        if (getWorkspaceMode() === "files") renderSidebarMode()
        return
      }

      const chatId = getActiveChatId()
      if (!chatId) return

      try {
        const result = await requestJson("/tools/run", {
          method: "POST",
          chatId,
          headers: {
            "x-chocks-permission-mode": "auto",
          },
          body: JSON.stringify({
            chatId,
            tool: "file_read",
            input: { path: normalizedPath },
            permissionMode: "auto",
            approvedTools: getApprovedToolsForChat(chatId),
          }),
        })

        if (result?.ok && typeof result?.output === "string") {
          saveFilePreviewState({
            path: normalizedPath,
            mode: editMode ? "edit" : "text",
            content: result.output,
            mime: "text",
            updatedAt: new Date().toISOString(),
          })
          if (getWorkspaceMode() === "files") renderSidebarMode()
          return
        }

        saveFilePreviewState({
          path: normalizedPath,
          mode: "binary",
          content: "",
          mime: "binary",
          updatedAt: new Date().toISOString(),
        })
        if (getWorkspaceMode() === "files") renderSidebarMode()
      } catch (error) {
        saveFilePreviewState({
          path: normalizedPath,
          mode: "binary",
          content: `Nao foi possivel abrir como texto: ${String(error)}`,
          mime: "binary",
          updatedAt: new Date().toISOString(),
        })
        if (getWorkspaceMode() === "files") renderSidebarMode()
      }
    }

    async function saveFilePreviewContent() {
      const chatId = getActiveChatId()
      if (!chatId || !filePreviewState?.path) return
      const textarea = sidebarPanelEl.querySelector("[data-file-preview-editor]")
      const nextContent = textarea instanceof HTMLTextAreaElement ? textarea.value : String(filePreviewState.content || "")

      try {
        await requestJson("/tools/run", {
          method: "POST",
          chatId,
          headers: {
            "x-chocks-permission-mode": "auto",
          },
          body: JSON.stringify({
            chatId,
            tool: "file_write",
            input: {
              path: filePreviewState.path,
              content: nextContent,
            },
            permissionMode: "auto",
            approvedTools: getApprovedToolsForChat(chatId),
          }),
        })

        saveFilePreviewState({
          ...filePreviewState,
          mode: "text",
          content: nextContent,
          updatedAt: new Date().toISOString(),
        })
        await navigateFileBrowser(fileBrowserState?.path || ".")
        showToast("Arquivo salvo")
      } catch (error) {
        showToast(`Erro: ${String(error)}`)
      }
    }

    async function navigateFileBrowser(targetPath) {
      const chatId = getActiveChatId()
      if (!chatId) return
      const result = await requestJson("/tools/run", {
        method: "POST",
        chatId,
        headers: {
          "x-chocks-permission-mode": "auto",
        },
        body: JSON.stringify({
          chatId,
          tool: "ls_safe",
          input: { path: targetPath },
          permissionMode: "auto",
          approvedTools: getApprovedToolsForChat(chatId),
        }),
      })
      if (result?.ok) {
        saveFileBrowserState({
          path: targetPath,
          entries: Array.isArray(result?.output?.entries) ? result.output.entries : [],
        })
        if (getWorkspaceMode() === "files") renderSidebarMode()
      }
    }
